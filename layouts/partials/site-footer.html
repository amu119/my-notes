<!-- 1. 页脚原有代码 -->
<footer class="{{ .Site.Params.background_color_class | compare.Default "bg-black" }} bottom-0 w-100 pa3" role="contentinfo">
  <div class="flex justify-between">
    <a class="f4 fw4 hover-white white-70 dn dib-ns pv2 ph3 no-underline" href="{{ .Site.Home.Permalink }}">
      &copy; {{ with .Site.Copyright | compare.Default .Site.Title }} {{ . | safe.HTML }} {{ now.Format "2006"}} {{ end }}
    </a>
    <div>{{ partials.IncludeCached "social/follow.html" . }}</div>
  </div>
</footer>

<!-- 2. 【核心】直接把搜索框写在这里，确保所有页面都有这个框 -->
<div id="fast-search-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9998;"></div>
<div id="fast-search-box" style="display:none; position:fixed; top:15%; left:50%; transform:translateX(-50%); width:80%; max-width:600px; background:#fff; border-radius:8px; padding:20px; z-index:9999; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
    <input type="text" id="search-input" placeholder="输入关键词搜索..." 
           style="width:100%; padding:12px; font-size:18px; border:1px solid #ddd; border-radius:4px; outline:none; box-sizing:border-box;" autofocus>
    <ul id="search-results" style="list-style:none; padding:0; margin:15px 0 0 0; max-height:400px; overflow-y:auto;"></ul>
</div>

<!-- 3. 搜索逻辑 JS -->
<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {


        // 直接通过 ID 精准获取搜索按钮
    const triggerBtn = document.getElementById('menu-search');

    // 获取搜索框元素
    const overlay = document.getElementById('fast-search-overlay');
    const searchBox = document.getElementById('fast-search-box');
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');
    
    let fuse = null;

    // 初始化搜索
    function initSearch() {
        if (fuse) return;
        fetch('/index.json')
            .then(response => response.json())
            .then(data => {
                fuse = new Fuse(data, { keys: ['title', 'content'], threshold: 0.3, includeMatches: true });
            });
    }

    // 显示/隐藏
    function toggleSearch(show) {
        if (show) {
            initSearch();
            overlay.style.display = 'block';
            searchBox.style.display = 'block';
            searchInput.focus();
        } else {
            overlay.style.display = 'none';
            searchBox.style.display = 'none';
            searchInput.value = '';
            resultsContainer.innerHTML = '';
        }
    }

    // 绑定按钮点击
    if (triggerBtn) {
        triggerBtn.addEventListener('click', function(e) {
            e.preventDefault();
            toggleSearch(true);
        });
    }

    // 监听输入
    searchInput.addEventListener('input', function() {
        const query = this.value.trim();
        resultsContainer.innerHTML = '';
        if (query && fuse) {
            const results = fuse.search(query);
            if (results.length > 0) {
                results.forEach(result => {
                    const li = document.createElement('li');
                    li.style.cssText = "padding:10px; border-bottom:1px solid #eee; cursor:pointer;";
                    li.innerHTML = `<a href="${result.item.url}" style="text-decoration:none; color:#333; font-size:16px;">${result.item.title}</a>`;
                    resultsContainer.appendChild(li);
                });
            } else {
                resultsContainer.innerHTML = '<li style="padding:10px; color:#888;">没有找到相关文章</li>';
            }
        }
    });
    overlay.addEventListener('click', () => toggleSearch(false));
});
</script>
