    <script>
  (function () {
    "use strict";

    
    
    function revealButtons() {
      var buttons = document.querySelectorAll(".code-block .code-copy[hidden]");
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].hidden = false;
      }
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", revealButtons);
    } else {
      revealButtons();
    }

    function flash(button) {
      var label = button.querySelector(".code-copy-label");
      var previous = label ? label.textContent : null;
      button.classList.add("is-copied");
      if (label) label.textContent = "Copied";
      window.setTimeout(function () {
        button.classList.remove("is-copied");
        if (label && previous !== null) label.textContent = previous;
      }, 2000);
    }

    function legacyCopy(text) {
      var area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "absolute";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      var ok = false;
      try {
        ok = document.execCommand("copy");
      } catch (e) {
        ok = false;
      }
      document.body.removeChild(area);
      return ok;
    }

    function copyFrom(button) {
      var container = button.closest(".code-block");
      if (!container) return;
      var pre = container.querySelector("pre");
      if (!pre) return;
      var source = pre.querySelector("code") || pre;
      var text = source.innerText;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function () { flash(button); },
          function () { if (legacyCopy(text)) flash(button); }
        );
      } else if (legacyCopy(text)) {
        flash(button);
      }
    }

    document.addEventListener("click", function (event) {
      var button = event.target.closest(".code-copy");
      if (button) copyFrom(button);
    });
  })();
</script>

    <input type="text" id="search-input" placeholder="输入关键词搜索..." 
           style="width:100%; padding:12px; font-size:18px; border:1px solid #ddd; border-radius:4px; outline:none; box-sizing:border-box;" autofocus>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {


        
    const triggerBtn = document.getElementById('menu-search');

    
    const overlay = document.getElementById('fast-search-overlay');
    const searchBox = document.getElementById('fast-search-box');
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');
    
    let fuse = null;

    
    function initSearch() {
        if (fuse) return;
        fetch('/index.json')
            .then(response => response.json())
            .then(data => {
                fuse = new Fuse(data, { keys: ['title', 'content'], threshold: 0.3, includeMatches: true });
            });
    }

    
    function toggleSearch(show) {
        if (show) {
            initSearch();
            overlay.style.display = 'block';
            searchBox.style.display = 'block';
            searchInput.focus();
        } else {
            overlay.style.display = 'none';
            searchBox.style.display = 'none';
            searchInput.value = '';
            resultsContainer.innerHTML = '';
        }
    }

    
    if (triggerBtn) {
        triggerBtn.addEventListener('click', function(e) {
            e.preventDefault();
            toggleSearch(true);
        });
    }

    
    searchInput.addEventListener('input', function() {
        const query = this.value.trim();
        resultsContainer.innerHTML = '';
        if (query && fuse) {
            const results = fuse.search(query);
            if (results.length > 0) {
                results.forEach(result => {
                    const li = document.createElement('li');
                    li.style.cssText = "padding:10px; border-bottom:1px solid #eee; cursor:pointer;";
                    li.innerHTML = `<a href="${result.item.url}" style="text-decoration:none; color:#333; font-size:16px;">${result.item.title}</a>`;
                    resultsContainer.appendChild(li);
                });
            } else {
                resultsContainer.innerHTML = '<li style="padding:10px; color:#888;">没有找到相关文章</li>';
            }
        }
    });
    overlay.addEventListener('click', () => toggleSearch(false));
});
</script></body>
